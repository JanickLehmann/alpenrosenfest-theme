{{ define "main"}}

            <!-- Forest scene with centered trees -->
            <!-- Ground line -->
            <line x1="0" y1="160" x2="240" y2="160" stroke="var(--secondary)" stroke-width="1" opacity="0.2" />
            
            <!-- Back layer trees (lighter) -->
            <g opacity="0.3">
              <!-- Left tree -->
              <path d="M30 160 L40 125 L50 160 Z" fill="var(--secondary)" />

            <!-- Middle layer trees -->
            <g opacity="0.6">
              <!-- Left-center tree -->
              <path d="M55 160 L70 100 L85 160 Z" fill="var(--secondary)" />

            <!-- Front layer - tallest, centered trees -->
            <g opacity="1">
              <!-- Main center-left tree -->
              <path d="M75 160 L100 50 L125 160 Z" fill="var(--secondary)" />

              <!-- Main center-right tree -->
              <path d="M115 160 L140 55 L165 160 Z" fill="var(--secondary)" />

            </g>
            
            <!-- Accent highlights on front trees -->
            <g opacity="0.25">
              <path d="M85 160 L100 95 L115 160 Z" fill="var(--accent)" />
              <path d="M125 160 L140 100 L155 160 Z" fill="var(--accent)" />
            </g>
          </svg>
          <h1 class="not-found-code">404</h1>
      </div>
      
      <div class="not-found-text">
          <h2>Seite nicht gefunden</h2>
          <p>Die aufgerufene Seite hat sich wohl im Wald verlaufen. Mit dem Knopf kommst du zurück auf die Startseite.</p>
      </div>
      
      <div class="not-found-actions">
          <a href="{{ site.Home.RelPermalink }}" class="btn btn-primary">Zur Startseite</a>
      </div>
    </div>
  </main>
{{ end }}
