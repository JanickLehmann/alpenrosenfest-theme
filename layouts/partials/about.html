{{ $about := site.Params.about }}

<section class="section section-about" id="ueber">
  <div class="container">
    <div class="section-header">
      <span class="section-label">{{ $about.label }}</span>
      <h2 class="section-title">{{ $about.title }}</h2>
    </div>
    <div class="about-grid">
      {{ range $about.cards }}
      <div class="about-card">
        <div class="about-card-icon">
          {{ partial "icon.html" (dict "icon" .icon) }}
        </div>
        <h3>{{ .title }}</h3>
        <p>{{ .text | safeHTML }}</p>
      </div>
      {{ end }}
    </div>
  </div>
</section>
