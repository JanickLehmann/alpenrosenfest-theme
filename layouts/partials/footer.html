<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        {{ partial "icon" (dict "icon" "flower" "class" "footer-logo-icon") }}
        <span>{{ site.Title }}</span>
      </div>
      <div class="footer-center">
        {{ partial "social.html" }}
        <span class="footer-sep">·</span>
        <a href="/impressum/" class="footer-link">Impressum</a>
      </div>
      <p class="footer-copy">{{ site.Copyright }}. {{ site.Params.footerTagline }}.</p>
    </div>
  </div>
</footer>
